version: 2

sources:
  - name: Stripe
    database: RAW_DATABASE
    schema: STRIPE
    tables:
      - name: payment
        loaded_at_field: _batched_at
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 12, period: day}

  - name: JAFFLE_SHOP
    database: RAW_DATABASE
    schema: JAFFLE_SHOP
    tables:
      - name: customers   # No freshness (no timestamp)

      - name: orders
        loaded_at_field: _etl_loaded_at
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 24, period: day}
